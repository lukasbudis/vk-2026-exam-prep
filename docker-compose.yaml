services:
  apache:
    build:
      context: .
      dockerfile: config/apache/Dockerfile
    ports:
      - "8080:80"
    networks:
      - backend
    volumes:
      - apache_data:/var/www/html

  nginx:
    image: nginx:latest
    ports:
      - "8081:80"
    depends_on:
      - php-fpm
    networks:
      - backend
    volumes:
      - ./config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./src/php-app:/var/www/html

  php-fpm:
    image: ppsdocker/vk-2026-be:latest
    build:
      context: .
      dockerfile: config/php-fpm/Dockerfile
    networks:
      - backend
    volumes:
      - ./src/php-app:/var/www/html

  vue-app:
    image: ppsdocker/vk-2026-fe:dev
    build:
      context: ./src/vue-app
      dockerfile: ../../config/nodejs/Dockerfile
      target: development
      args:
        - NODE_ENV=development
    volumes:
      - /app/node_modules
      - ./src/vue-app:/app
    command: [ "npm", "run", "dev", "--", "--host" ]
    ports:
      - "8082:8080"
      - "9000:9000"
    networks:
      - backend

  rust-app:
    build:
      context: .
      dockerfile: config/rust/Dockerfile
    ports:
      - "8083:8080"
    networks:
      - backend

  mysql:
    image: mysql:latest
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mydb
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    networks:
      - backend
    volumes:
      - mysql_data:/var/lib/mysql


networks:
  backend:
    driver: bridge

volumes:
  apache_data:
  mysql_data: