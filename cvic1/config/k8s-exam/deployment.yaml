apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-app
  namespace: exam-budis-logapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-app
  template:
    metadata:
      labels:
        app: hello-app
    spec:

      volumes:
      - name: volume1
        configMap:
          name: cvic-config
      - name: logs
        persistentVolumeClaim:
         claimName: ukf-pv-claim

      containers:
      - name: container1
        image: nginx
        ports:
        - containerPort: 80
        envFrom:
        - configMapRef:
            name: cvic-config
        - secretRef:
            name: app-secret

        volumeMounts:
        - name: volume1
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        - name: logs
          mountPath: /var/log/nginx/

