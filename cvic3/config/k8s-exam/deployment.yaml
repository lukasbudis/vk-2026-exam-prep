apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-app
  namespace: exam-budis-template
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-app
  template:
    metadata:
      labels:
        app: hello-app
    spec:
      volumes:
      - name: web-content
        persistentVolumeClaim:
          claimName: template-pv-claim
      initContainers:
      - name: render-template
        image: busybox
        envFrom:
        - configMapRef:
            name: app-config
        command:
        - sh
        - -c
        - |
          cat > /work/index.html <<EOF
          <!DOCTYPE html>
          <html lang="sk">
          <head>
            <meta charset="utf-8">
            <title>${SITE_TITLE}</title>
            <style>
              body { background:${THEME}; font-family:sans-serif; padding:2rem; color:#fff; min-height:100vh; }
              h1 { font-size:2.5rem; margin-bottom:1rem; }
              p  { font-size:1.2rem; max-width:640px; line-height:1.5; }
              small { display:block; margin-top:2rem; opacity:0.6; }
            </style>
          </head>
          <body>
            <h1>${SITE_TITLE}</h1>
            <p>${MESSAGE}</p>
            <small>Generated by InitContainer at $(date)</small>
          </body>
          </html>
          EOF
        volumeMounts:
        - name: web-content
          mountPath: /work
      containers:
      - name: container1
        image: nginx
        ports:
        - containerPort: 80
        volumeMounts:
        - name: web-content
          mountPath: /usr/share/nginx/html
